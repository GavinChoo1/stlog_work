services:
  spark-master:
    image: apache/spark:3.5.1
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "10000:10000"
    volumes:
      - ./conf/hive-site.xml:/opt/spark/conf/hive-site.xml
    # Explicitly start the Master in the foreground
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    image: apache/spark:3.5.1
    environment:
      - SPARK_MODE=worker
    depends_on:
      - spark-master
    volumes:
      - ./conf/hive-site.xml:/opt/spark/conf/hive-site.xml
    # Explicitly start the Worker and point it to the Master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077