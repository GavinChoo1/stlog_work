version: '3.8'

services:
  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: local-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # Redis Insight Service (Now correctly aligned with 'redis')
  redisinsight:
    image: redis/redisinsight:latest
    container_name: local-redisinsight
    restart: always
    ports:
      - "8001:5540"

volumes:
  redisdata: