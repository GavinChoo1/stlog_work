version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pg_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      # 1. Bind Mount for persistent data
      - ./pg_data:/var/lib/postgresql/data
      # 2. Bind Mount for your initial SQL script
      # This script will now create hot_db, and cold_db
      - ./full_setup.sql:/docker-entrypoint-initdb.d/init.sql
