version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: local-postgres-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: hls_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pg_db/full_setup.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  pgdata: