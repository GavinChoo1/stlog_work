version: '3.8'

services:
  starrocks:
    image: starrocks/allin1-ubuntu
    container_name: starrocks_db
    ports:
      - "9030:9030"
    volumes:
      # Maps your local Windows folders to the Linux container
      - ./fe_meta:/opt/starrocks/fe/meta
      - ./be_storage:/opt/starrocks/be/storage
    restart: unless-stopped
